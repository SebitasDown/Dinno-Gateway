server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: example_route
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - JwtFilter

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:https://dinno-eurekaserver-1.onrender.com/eureka/}
    fetch-registry: true
    register-with-eureka: true

jwt:
  secret: ${JWT_SECRET:default_secret_key_change_me_in_production}
